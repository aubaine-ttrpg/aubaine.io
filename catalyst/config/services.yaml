# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    # Local, dev-only storage: authored books live here (git-ignored).
    app.books_directory: '%kernel.project_dir%/var/books'
    # Seed game data the skill-tree page consumes.
    app.skill_trees_directory: '%kernel.project_dir%/data/skill-trees'
    app.skill_tree_schema: '%kernel.project_dir%/data/skilltree.schema.json'
    # Cover artwork the picker offers.
    app.covers_directory: '%kernel.project_dir%/assets/images/covers'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Every page type is auto-tagged so the registry can collect it; adding a
    # new page to the catalog needs no wiring beyond implementing the interface.
    _instanceof:
        App\Page\PageTypeInterface:
            tags: ['app.page_type']

    App\:
        resource: '../src/'

    App\Book\BookRepository:
        arguments:
            $booksDirectory: '%app.books_directory%'

    App\SkillTree\SkillTreeRepository:
        arguments:
            $treesDirectory: '%app.skill_trees_directory%'
            $schemaPath: '%app.skill_tree_schema%'

    App\Page\PageTypeRegistry:
        arguments:
            $pageTypes: !tagged_iterator app.page_type

    App\Design\CoverImageLibrary:
        arguments:
            $coversDirectory: '%app.covers_directory%'
